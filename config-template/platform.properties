# The basic descriptions of the graph processing platform.
platform.name = ArcadeDB
platform.acronym = arcadedb
platform.version = 1.0
platform.link = https://github.com/ArcadeData/ldbc_graphalytics_platforms_arcadedb

# Home directory of ArcadeDB (optional, for reference only in embedded mode)
platform.arcadedb.home =

# Enable Graph OLAP (Graph Analytical View / CSR acceleration).
# When true, a GAV is built after opening the database and before running each algorithm.
# Built-in algorithms (BFS, WCC, LCC, SSSP) automatically use the CSR-accelerated path.
# Default: false
platform.olap = false
